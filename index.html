<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title> <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
            <h1 class="text-center mb-4">Login</h1> <details class="mb-3">
                <summary class="text-primary" style="cursor: pointer;">Show Instructions</summary>
                <p class="small text-muted mt-2">Enter your info to access your account. </p>
            </details>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label> <input type="text" id="username" class="form-control" placeholder="Enter here" required> </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label> <input type="password" id="password" class="form-control" placeholder="Password" required>
                </div>
                
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="stayLoggedIn">
                    <label class="form-check-label small" for="stayLoggedIn">Stay logged in</label> <p class="text-muted extra-small" style="font-size: 0.75rem;">Your session will stay on this device.</p>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Login</button> <button type="reset" class="btn btn-outline-secondary">Cancel</button> </div>
            </form>
            
            <div class="text-center mt-3">
                <a href="#" class="small text-decoration-none">Forgot username or password ?</a> </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
